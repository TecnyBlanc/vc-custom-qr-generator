<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RCUSTOM QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f5f5f5;
        color: #111;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      /* Layout & Navigation */
      .app-container {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: #f5f5f5;
        position: relative;
      }
      .view {
        display: none;
        padding: 16px;
        padding-bottom: 70px; /* Space for bottom nav */
      }
      .view.active {
        display: block;
        animation: fadeIn 0.2s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        text-align: center;
        letter-spacing: 3px;
        margin: 16px 0 24px;
        color: #111;
      }

      /* --- GENERATOR TAB STYLES --- */
      .qr-box {
        display: flex;
        justify-content: center;
        margin-bottom: 16px;
      }
      #qr-canvas {
        width: 180px;
        height: 180px;
        border-radius: 10px;
        border: 1px solid #ddd;
        background: #fff;
        overflow: hidden;
      }
      #qr-canvas canvas {
        display: block !important;
      }
      #qr-canvas img {
        display: none !important;
      }

      .dims {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 14px;
      }
      .dim-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dim-label {
        font-size: 13px;
        color: #666;
        width: 14px;
        flex-shrink: 0;
        font-weight: 500;
      }
      .dim-val {
        font-size: 13px;
        font-weight: 600;
        color: #111;
        width: 44px;
        text-align: right;
        flex-shrink: 0;
      }
      .slider-wrap {
        flex: 1;
      }
      input[type="range"] {
        width: 100%;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: #ddd;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #111;
        cursor: pointer;
      }

      .scale-btns {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .scale-btn {
        font-size: 11px;
        padding: 3px 7px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #f0f0f0;
        color: #555;
        cursor: pointer;
        transition: all 0.1s;
      }
      .scale-btn.active {
        background: #111;
        color: #fff;
        border-color: #111;
      }

      .bottom-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 14px;
      }
      .save-btn {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        background: #fff;
        color: #111;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
      }
      .save-btn:hover {
        background: #f5f5f5;
      }
      #save-tick {
        opacity: 0;
        font-size: 12px;
        color: #2a9d5c;
        transition: opacity 0.3s;
      }

      .saved-section {
        margin-top: 4px;
      }
      .saved-title {
        font-size: 11px;
        color: #999;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .saved-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 240px;
        overflow-y: auto;
      }
      .saved-card {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 8px 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }
      .dims-text {
        flex: 1;
        font-size: 12px;
        color: #666;
      }
      .dims-text strong {
        color: #111;
        font-weight: 600;
        font-size: 13px;
        display: block;
      }
      .del-btn {
        font-size: 13px;
        padding: 2px 8px;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
        background: transparent;
        color: #aaa;
        cursor: pointer;
      }

      /* --- LIST QR TAB STYLES --- */
      .category-block {
        margin-bottom: 24px;
      }
      .category-title {
        font-size: 14px;
        color: #666;
        margin-bottom: 10px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 4px;
        font-weight: 600;
      }
      .grid-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .list-card {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .list-card:active {
        transform: scale(0.97);
      }
      .list-card-code {
        font-size: 12px;
        font-weight: 600;
        color: #111;
        margin-bottom: 8px;
        text-align: center;
        word-break: break-all;
      }
      .small-qr-container {
        width: 60px;
        height: 60px;
        pointer-events: none;
      }
      .small-qr-container canvas {
        display: block !important;
        width: 100%;
        height: 100%;
      }
      .small-qr-container img {
        display: none !important;
      }

      /* --- MODAL (EXPANDED QR) STYLES --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(2px);
      }
      .modal-overlay.active {
        display: flex;
        animation: fadeIn 0.2s;
      }
      .modal-box {
        background: #fff;
        padding: 24px;
        border-radius: 16px;
        width: 90%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }
      .modal-close {
        position: absolute;
        top: 12px;
        right: 16px;
        font-size: 24px;
        color: #999;
        cursor: pointer;
        border: none;
        background: none;
      }
      .modal-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 16px;
        color: #111;
        text-align: center;
      }
      #modal-qr {
        width: 200px;
        height: 200px;
        margin-bottom: 16px;
      }
      #modal-qr canvas {
        display: block !important;
        width: 100%;
        height: 100%;
      }
      #modal-qr img {
        display: none !important;
      }
      .modal-desc {
        font-size: 14px;
        color: #555;
        text-align: center;
        line-height: 1.4;
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
        width: 100%;
      }

      /* --- BOTTOM NAVIGATION --- */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-top: 1px solid #ddd;
        display: flex;
        justify-content: space-around;
        padding: 12px 0;
        z-index: 50;
      }
      .nav-btn {
        background: none;
        border: none;
        font-size: 14px;
        font-weight: 600;
        color: #888;
        cursor: pointer;
        padding: 8px 24px;
        transition: color 0.2s;
      }
      .nav-btn.active {
        color: #111;
        border-bottom: 2px solid #111;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- TAB 1: GENERATE (RCUSTOM) -->
      <div id="view-generate" class="view active">
        <h1>RCUSTOM</h1>
        <div class="qr-box"><div id="qr-canvas"></div></div>
        <div class="dims" id="dims-ui"></div>
        <div class="bottom-row">
          <button class="save-btn" onclick="saveCard()">💾 Save carton</button>
          <span id="save-tick">Saved ✓</span>
        </div>
        <div class="saved-section">
          <div class="saved-title">Saved cartons</div>
          <div class="saved-list" id="saved-list"></div>
        </div>
      </div>

      <!-- TAB 2: LIST QR -->
      <div id="view-list" class="view">
        <h1>LIST QR</h1>
        <div id="list-render-area"></div>
      </div>

      <!-- BOTTOM NAVIGATION -->
      <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('generate')">
          Generate
        </button>
        <button class="nav-btn" onclick="switchTab('list')">List QR</button>
      </div>

      <!-- EXPANDED QR MODAL -->
      <div id="qr-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="closeModal(event)">
            &times;
          </button>
          <div class="modal-title" id="modal-code">P03-24-1-2</div>
          <div id="modal-qr"></div>
          <div class="modal-desc" id="modal-desc">Description: Self filled</div>
        </div>
      </div>
    </div>

    <script>
      /* =========================================
   ROUTING & TABS
========================================= */
      function switchTab(tabId) {
        // Update views
        document
          .querySelectorAll(".view")
          .forEach((v) => v.classList.remove("active"));
        document.getElementById("view-" + tabId).classList.add("active");

        // Update buttons
        document
          .querySelectorAll(".nav-btn")
          .forEach((b) => b.classList.remove("active"));
        event.target.classList.add("active");
      }

      /* =========================================
   APP 1: RCUSTOM GENERATOR LOGIC
========================================= */
      const STORE_STATE = "rcustom_state";
      const STORE_SAVED = "rcustom_saved";

      const DIMS = [
        {
          key: "L",
          label: "L",
          defaultScale: 6,
          scaleOptions: [4, 5, 6, 7],
          defaultVal: 60,
        },
        {
          key: "W",
          label: "W",
          defaultScale: 4,
          scaleOptions: [2, 3, 4, 5],
          defaultVal: 40,
        },
        {
          key: "H",
          label: "H",
          defaultScale: 3,
          scaleOptions: [2, 3, 4, 5],
          defaultVal: 30,
        },
      ];

      function loadState() {
        try {
          const s = localStorage.getItem(STORE_STATE);
          if (s) return JSON.parse(s);
        } catch (e) {}
        return { L: 60, W: 40, H: 30, scales: { L: 6, W: 4, H: 3 } };
      }

      function loadSaved() {
        try {
          const s = localStorage.getItem(STORE_SAVED);
          if (s) return JSON.parse(s);
        } catch (e) {}
        return [];
      }

      function persistState() {
        try {
          localStorage.setItem(
            STORE_STATE,
            JSON.stringify({
              L: state.L,
              W: state.W,
              H: state.H,
              scales: state.scales,
            }),
          );
        } catch (e) {}
      }
      function persistSaved() {
        try {
          localStorage.setItem(STORE_SAVED, JSON.stringify(state.saved));
        } catch (e) {}
      }

      const _s = loadState();
      const state = {
        L: _s.L,
        W: _s.W,
        H: _s.H,
        scales: _s.scales,
        saved: loadSaved(),
      };

      function scaleMin(s) {
        return s * 10;
      }
      function scaleMax(s) {
        return s * 10 + 9;
      }

      function buildUI() {
        const ui = document.getElementById("dims-ui");
        ui.innerHTML = "";
        DIMS.forEach((d) => {
          const min = scaleMin(state.scales[d.key]);
          const max = scaleMax(state.scales[d.key]);
          state[d.key] = Math.min(Math.max(state[d.key], min), max);

          const row = document.createElement("div");
          row.className = "dim-row";
          const lbl = document.createElement("span");
          lbl.className = "dim-label";
          lbl.textContent = d.label;
          row.appendChild(lbl);

          const sw = document.createElement("div");
          sw.className = "slider-wrap";
          const sl = document.createElement("input");
          sl.type = "range";
          sl.min = min;
          sl.max = max;
          sl.step = 1;
          sl.value = state[d.key];
          sl.id = "sl_" + d.key;
          sl.oninput = () => {
            state[d.key] = parseInt(sl.value);
            updateVal(d.key);
            updateGeneratorQR();
            persistState();
          };
          sw.appendChild(sl);
          row.appendChild(sw);

          const dv = document.createElement("span");
          dv.className = "dim-val";
          dv.id = "dv_" + d.key;
          dv.textContent = state[d.key] + " cm";
          row.appendChild(dv);

          const btns = document.createElement("div");
          btns.className = "scale-btns";
          d.scaleOptions.forEach((n) => {
            const b = document.createElement("button");
            b.className =
              "scale-btn" + (state.scales[d.key] === n ? " active" : "");
            b.textContent = n;
            b.onclick = () => {
              state.scales[d.key] = n;
              persistState();
              buildUI();
              updateGeneratorQR();
            };
            btns.appendChild(b);
          });
          row.appendChild(btns);
          ui.appendChild(row);
        });
      }

      function updateVal(key) {
        const el = document.getElementById("dv_" + key);
        if (el) el.textContent = state[key] + " cm";
      }

      function updateGeneratorQR() {
        const tab = "\t";
        const payload =
          "RCUSTOM" +
          tab +
          (state.L / 100).toFixed(2) +
          tab +
          (state.W / 100).toFixed(2) +
          tab +
          (state.H / 100).toFixed(2);
        const container = document.getElementById("qr-canvas");
        container.innerHTML = "";
        try {
          new QRCode(container, {
            text: payload,
            width: 180,
            height: 180,
            correctLevel: QRCode.CorrectLevel.M,
          });
        } catch (e) {}
      }

      function saveCard() {
        state.saved.unshift({ L: state.L, W: state.W, H: state.H });
        persistSaved();
        renderSaved();
        const tick = document.getElementById("save-tick");
        tick.style.opacity = 1;
        setTimeout(() => (tick.style.opacity = 0), 1800);
      }

      function loadCard(entry) {
        state.L = entry.L;
        state.W = entry.W;
        state.H = entry.H;
        state.scales.L = Math.floor(entry.L / 10);
        state.scales.W = Math.floor(entry.W / 10);
        state.scales.H = Math.floor(entry.H / 10);
        persistState();
        buildUI();
        updateGeneratorQR();
      }

      function renderSaved() {
        const list = document.getElementById("saved-list");
        if (!state.saved.length) {
          list.innerHTML =
            '<div class="empty-msg" style="font-size:12px; color:#bbb; padding:6px 0;">No saved cartons yet.</div>';
          return;
        }
        list.innerHTML = "";
        state.saved.forEach((e, i) => {
          const card = document.createElement("div");
          card.className = "saved-card";
          card.onclick = (ev) => {
            if (!ev.target.classList.contains("del-btn")) loadCard(e);
          };

          const info = document.createElement("div");
          info.className = "dims-text";
          info.innerHTML =
            "<strong>" +
            e.L +
            " × " +
            e.W +
            " × " +
            e.H +
            " cm</strong>" +
            (e.L / 100).toFixed(2) +
            " × " +
            (e.W / 100).toFixed(2) +
            " × " +
            (e.H / 100).toFixed(2) +
            " m";
          card.appendChild(info);

          const del = document.createElement("button");
          del.className = "del-btn";
          del.textContent = "×";
          del.onclick = () => {
            state.saved.splice(i, 1);
            persistSaved();
            renderSaved();
          };
          card.appendChild(del);
          list.appendChild(card);
        });
      }

      /* =========================================
   APP 2: LIST QR & MODAL LOGIC
========================================= */

      // Define your operational QR codes here
      const QR_DATABASE = {
        "Hàng Lỗi": [
          {
            code: "PMB2C901",
            desc: "**Hàng thiếu tem TV**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "PMB2C900",
            desc: "**Hàng Lỗi B2C (Tạm thời)**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "PMB2B901",
            desc: "**Hàng Lỗi B2B (Tạm thời)**\n, WH Code = 901\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
        ],
        "Trả Cancel": [
          {
            code: "PUMB2CPck",
            desc: "**Trả Cancel B2C Single**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "PSTATION01",
            desc: "**Trả Cancel B2C Multi**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "PUMAOUT",
            desc: "**Trả Cancel B2B**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "PUMB2BPck",
            desc: "**Trả Cancel B2B**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
        ],
        "Hàng Thiếu": [
          {
            code: "P03-21-1-1",
            desc: "**Hàng thiếu B2B (Tạm thời)**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "P03-21-1-2",
            desc: "**Hàng thiếu B2C (Tạm thời)**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
        ],
        Consumables: [
          {
            code: "CONSPUM001",
            desc: "**Hàng Inbound Consumables**\n, \n, Mất ID: KHÔNG\n, Mất UCC: KHÔNG",
          },
          {
            code: "CONSPUM003",
            desc: "**Trung gian Consumables**\n, \n, Mất ID: KHÔNG\n, Mất UCC: KHÔNG",
          },
          {
            code: "CONSPUM004",
            desc: "**Loc và ID của hàng xuất Consum**\n, \n, Mất ID: KHÔNG\n, Mất UCC: KHÔNG",
          },
        ],
        "Lab Test - Viện Dệt May": [
          {
            code: "PUMAVTRI",
            desc: "**Viện Dệt May - Xuất hàng xong**\n, WH Code = 999\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
          {
            code: "PUMAVTRI01",
            desc: "**Viện Dệt May - Chờ xuất hàng**\n, WH Code = 999\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
        ],
        "Trung Gian": [
          {
            code: "PMVB",
            desc: "**Trung gian dồn rack**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: KHÔNG",
          },
          {
            code: "PMVM",
            desc: "**Trung gian chỉnh tồn**\n, WH Code = 001\n, Mất ID: KHÔNG\n, Mất UCC: CÓ",
          },
        ],
      };

      function renderListQR() {
        const container = document.getElementById("list-render-area");
        container.innerHTML = "";

        for (const [category, items] of Object.entries(QR_DATABASE)) {
          // Create category block
          const catBlock = document.createElement("div");
          catBlock.className = "category-block";

          // Category title
          const title = document.createElement("div");
          title.className = "category-title";
          title.textContent = `[${category}]`;
          catBlock.appendChild(title);

          // Cards Grid
          const grid = document.createElement("div");
          grid.className = "grid-cards";

          items.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "list-card";

            // Click event to open Modal
            card.onclick = () => openModal(item.code, item.desc);

            const codeTitle = document.createElement("div");
            codeTitle.className = "list-card-code";
            codeTitle.textContent = item.code;

            const qrHolder = document.createElement("div");
            qrHolder.className = "small-qr-container";
            // Unique ID for generation
            const qrId = `qr-small-${category.replace(/\s+/g, "")}-${index}`;
            qrHolder.id = qrId;

            card.appendChild(codeTitle);
            card.appendChild(qrHolder);
            grid.appendChild(card);

            // Generate QR after DOM insertion
            setTimeout(() => {
              new QRCode(document.getElementById(qrId), {
                text: item.code,
                width: 60,
                height: 60,
                correctLevel: QRCode.CorrectLevel.L,
              });
            }, 0);
          });

          catBlock.appendChild(grid);
          container.appendChild(catBlock);
        }
      }

      // Modal Functions
      function openModal(code, description) {
        document.getElementById("modal-code").textContent = code;
        document.getElementById("modal-desc").textContent =
          `Description: ${description}`;

        const modalQrContainer = document.getElementById("modal-qr");
        modalQrContainer.innerHTML = ""; // Clear old QR

        // Generate big QR
        new QRCode(modalQrContainer, {
          text: code,
          width: 200,
          height: 200,
          correctLevel: QRCode.CorrectLevel.M,
        });

        document.getElementById("qr-modal").classList.add("active");
      }

      function closeModal(event) {
        // Prevent closing if clicking inside the white box
        if (
          event.target.classList.contains("modal-box") ||
          (event.target.closest(".modal-box") &&
            !event.target.classList.contains("modal-close"))
        ) {
          return;
        }
        document.getElementById("qr-modal").classList.remove("active");
      }

      /* =========================================
   INITIALIZATION
========================================= */
      buildUI();
      updateGeneratorQR();
      renderSaved();
      renderListQR(); // Generate the static lists
    </script>
  </body>
</html>
